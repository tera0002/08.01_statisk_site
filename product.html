<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <link rel="stylesheet" href="style.css" />
    <title>Products</title>
  </head>

  <body>
    <header>
      <div class="logo">
        <a href="index.html">
          <img src="img/logo1.png" alt="Logo" />
        </a>
      </div>
      <nav>
        <ul class="menu">
          <li><a href="productlist.html">Categories</a></li>
          <li><a href="productlist.html">Brands</a></li>
          <li><a href="productlist.html">Seasons</a></li>
        </ul>
        <button class="burger">
          <span class="line"></span>
          <span class="line"></span>
          <span class="line"></span>
        </button>
      </nav>
    </header>

    <main>
      <h1>Product Details</h1>

      <a href="productlist.html" class="retur">Retur til produkter</a>

      <section class="product_details_list">
        <div class="imgwrap wrap">
          <!-- wrap class aswell??? -->
          <img
            src="https://kea-alt-del.dk/t7/images/webp/640/15890.webp"
            alt="product image"
          />
          <p class="hide">Udsolgt</p>
          <p class="sale">75<span>%</span></p>
        </div>

        <div class="productdetails">
          <h3 class="produktnavn">Produktnavn</h3>
          <p class="brand">Crocs <span>X</span> Tweety</p>
          <div class="price">
            <p class="pricebefore"><span>899</span>,-</p>
            <p class="priceafter"><span>199</span>,-</p>
          </div>
          <p class="stock">In stock: <span>32</span></p>
          <a href="/" class="laegikurv">Add to cart</a>
        </div>
      </section>
    </main>
    <!-- 
    <script src="main.js"></script> -->
    <footer>FashionRUs &copy; 2026</footer>
  </body>
</html>
